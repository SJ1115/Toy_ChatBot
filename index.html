<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>남아공커피</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 홈페이지 -->
  <header class="site-header">
    <div class="logo">☕ 남아공커피</div>
    <nav>
      <button class="nav-btn">메뉴</button>
      <button class="nav-btn">주문</button>
      <button class="nav-btn">매장 찾기</button>
      <button class="nav-btn">이벤트</button>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h1>남아공에서 온<br>진한 한 잔</h1>
      <p class="hero-sub">아프리카의 태양이 담긴 원두로 내린 스페셜티 커피</p>
      <div class="hero-actions">
        <button class="btn-primary">메뉴 보기</button>
        <button class="btn-outline">매장 예약</button>
      </div>
    </section>

    <section class="cards">
      <div class="card">
        <span class="card-icon">🫘</span>
        <h3>시그니처 블렌드</h3>
        <p>남아공 농장 직수입 원두</p>
        <button class="card-btn">자세히</button>
      </div>
      <div class="card">
        <span class="card-icon">🥛</span>
        <h3>시즌 라떼</h3>
        <p>여름 한정 망고 라떼</p>
        <button class="card-btn">주문하기</button>
      </div>
      <div class="card">
        <span class="card-icon">🎁</span>
        <h3>멤버십</h3>
        <p>10잔 적립 시 1잔 무료</p>
        <button class="card-btn">가입하기</button>
      </div>
    </section>
  </main>

  <!-- 챗봇 위젯 -->
  <div class="widget">
    <div class="chat-panel" id="chat-panel">
      <div class="chat-header">
        <span class="header-title">나만의 AI 도우미</span>
        <button id="reset-btn">초기화</button>
      </div>
      <div class="chat-messages" id="messages"></div>
      <div class="chat-input">
        <input type="text" id="user-input" placeholder="무엇이든 물어보세요..." />
        <button id="send-btn">전송</button>
      </div>
    </div>

    <button class="chat-fab" id="chat-fab" aria-label="챗봇 열기">
      <span id="fab-open">💬</span>
      <span id="fab-close" hidden>✕</span>
    </button>
  </div>

  <script src="chatbot.js"></script>
</body>
</html>
