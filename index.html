<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>텍스트 변환기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="logo">✏️ 텍스트 변환기</div>
    <p class="header-desc">키워드와 직무를 자동으로 교체하고 문장을 다듬어드립니다</p>
  </header>

  <main class="converter-grid">
    <!-- 왼쪽: 입력 패널 -->
    <section class="left-panel">
      <div class="field-group full-height">
        <label for="text-input">① 변환할 텍스트</label>
        <textarea id="text-input" placeholder="변환할 텍스트를 붙여 넣으세요..."></textarea>
      </div>

      <div class="keyword-row">
        <div class="field-group flex-1">
          <label for="keyword1">② 문제 키워드 (원본)</label>
          <input id="keyword1" type="text" placeholder="예: 삼성전자" />
        </div>
        <div class="arrow-col">→</div>
        <div class="field-group flex-1">
          <label for="keyword2">③ 대체 키워드</label>
          <input id="keyword2" type="text" placeholder="예: LG전자" />
        </div>
      </div>

      <div class="field-group">
        <label for="keyword3">④ 대체할 직무 키워드</label>
        <input id="keyword3" type="text" placeholder="예: UX 디자이너" />
      </div>

      <button id="transform-btn" class="transform-btn">
        <span id="btn-text">변환하기</span>
        <span id="btn-loading" hidden>변환 중...</span>
      </button>
      <p id="status" class="status"></p>
    </section>

    <!-- 오른쪽: 출력 패널 -->
    <section class="right-panel">
      <div class="output-header">
        <label>변환 결과</label>
        <button id="copy-btn" class="copy-btn" disabled>복사</button>
      </div>
      <div id="output" class="output-box" aria-live="polite"></div>
    </section>
  </main>

  <script src="transformer.js"></script>
</body>
</html>
